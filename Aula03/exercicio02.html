<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA 3 - EXERCICIO 02</title>
</head>

<body>
    <h1> INTERAÇÃO COM JS COM FORMS DO HTML</h1>
    <hr>
    <form action="#">
        <input type="number" name="num1" id="num1" placeholder="Digite o 1º número" required>
        <input type="number" name="num2" id="num2" placeholder="Digite o 2º número" required>
        <br>
        <hr>
        <input type="button" value="Adição" onclick="somar();">
        <input type="button" value="Subtração" onclick="subtracao();">
        <input type="button" value="Limpar" onclick="limpar_campos();">
    </form>
    <div>
        <p>
            <spam id="resultado"></spam>
        </p>
    </div>
    <script>
        function somar() {
            let valor1 = document.getElementById('num1')
            let valor2 = document.getElementById('num2')
            let soma = Number(valor1.value) + Number(valor2.value)
            document.getElementById('resultado').innerText = "O resultado é " + soma
        }
        function subtracao() {
            let valor1 = document.getElementById('num1')
            let valor2 = document.getElementById('num2')
            let subtr = Number(valor1.value) - Number(valor2.value)
            document.getElementById('resultado').innerText = "O resultado é " + subtr
        }
        function limpar_campos() {
            document.getElementById('num1').value = ""
            document.getElementById('num2').value = ""
            document.getElementById('resultado').innerText = ""
        }
    </script>
</body>

</html>
