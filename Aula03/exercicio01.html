<head>
    <meta charset="UTF-8">

<body>
    <h1>MANIPULANDO IMAGENS DO HTML ATRAVÉS DO JS</h1>
    <hr>
    <div>
        <img width="50%" src="/img/iphone.jpg" alt="DINHEIRO">
        <button onclick="trocarimagem1()">IPHONE</button>
         <button onclick="trocarimagem2()">DINHEIRO</button>
    </div>

    <script>
    function trocarimagem1() {
        const tags_img = document.getElementsByTagName('img');
        console.log(tags_img);
        let tags_img_2 = tags_img[0];

            tags_img_2.src = "/img/iphone.jpg"
            tags_img_2.title = "iphone"
        }

        function trocarimagem2() {
        const tags_img = document.getElementsByTagName('img');
        console.log(tags_img);
        let tags_img_2 = tags_img[0];
        
            tags_img_2.src = "/img/dinheiro.jpg"
            tags_img_2.title = "dinheiro"
        }



    </script>
</body>

</html>
