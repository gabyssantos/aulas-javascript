<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="../favicon.jpg">
    <title>EXERCÍCIO 1 - JAVASCRIPT</title>
    <meta name="description" content="Coneúdo das aulas de JS">
    <meta name="keywords" content="sites, web, frontend">
    <meta name="author" content="Gabrielly">
</head>

<body>
    <h1>MANIPULANDO ELEMENTOS (TAGS) DO HTML ATRAVÉS DO JS</h1>
    <hr>
    <div>
        <p>EU AMO MEUS AMIGOS</p>
        <p>AMO O BER</p>
        <p>Eu gosto de ir a praia, ir para a escola, fazer bolos e doces</p>
    </div>

    <script>
        const tags_p = document.getElementsByTagName('p');
        console.log(tags_p);
        let tags_p_1 = tags_p[0];
        tags_p_1.style.backgroundColor = "blue";
        tags_p_1.style.color = "white";
        tags_p_1.style.textAlign = "center"

        let tags_p_2 = tags_p[1];
        tags_p_2.style.backgroundColor = "pink";
        tags_p_2.style.color = "white";
        tags_p_2.style.fontSize = "20pt"
        tags_p_2.style.textAlign = "center"

        let tags_p_3 = tags_p[2];
        tags_p_3.style.backgroundColor = "purple";
        tags_p_3.style.color = "white";
        tags_p_3.style.textAlign = "center"

        tags_p_3.innerText = "EU AMO IR A PRAIA, FAZER BOLOS, DOCES E PASSEAR"
    </script>
</body>

</html>
